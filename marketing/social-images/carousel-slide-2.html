<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Slide 2 - The Problem</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .slide {
            width: 1080px;
            height: 1080px;
            background: #1a1a2e;
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            padding: 80px;
            position: relative;
        }
        
        .slide-number {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 18px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
        }
        
        .header {
            margin-bottom: 60px;
        }
        
        h2 {
            font-size: 56px;
            font-weight: 800;
            color: white;
            margin-bottom: 16px;
        }
        
        .subtitle {
            font-size: 24px;
            color: rgba(255,255,255,0.7);
        }
        
        .items {
            display: flex;
            flex-direction: column;
            gap: 24px;
            flex: 1;
        }
        
        .item {
            display: flex;
            align-items: center;
            gap: 24px;
            background: rgba(255,255,255,0.05);
            padding: 32px;
            border-radius: 12px;
        }
        
        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            flex-shrink: 0;
        }
        
        .item-content h3 {
            font-size: 28px;
            font-weight: 700;
            color: white;
            margin-bottom: 8px;
        }
        
        .item-content p {
            font-size: 18px;
            color: rgba(255,255,255,0.6);
        }
        
        .branding {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.4);
        }
        
        .handle {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-number">2/7</div>
        <div class="header">
            <h2>The Problem</h2>
            <p class="subtitle">How I used to use AI:</p>
        </div>
        <div class="items">
            <div class="item">
                <div class="icon">❓</div>
                <div class="item-content">
                    <h3>Ask a question</h3>
                    <p>Get an answer</p>
                </div>
            </div>
            <div class="item">
                <div class="icon">💬</div>
                <div class="item-content">
                    <h3>Ask for help</h3>
                    <p>Get suggestions</p>
                </div>
            </div>
            <div class="item">
                <div class="icon">📝</div>
                <div class="item-content">
                    <h3>Ask for content</h3>
                    <p>Get text... then do everything myself</p>
                </div>
            </div>
        </div>
        <div class="branding">Your First AI Employee</div>
        <div class="handle">@AskFizz</div>
    </div>
</body>
</html>
