<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Twitter Header - Your First AI Employee</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a2e;
            padding: 20px;
        }
        
        .header {
            width: 1500px;
            height: 500px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            padding: 60px 80px;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 600px;
            height: 600px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .header::after {
            content: '';
            position: absolute;
            bottom: -30%;
            right: 20%;
            width: 400px;
            height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }
        
        .content {
            position: relative;
            z-index: 1;
            color: white;
            max-width: 900px;
        }
        
        .badge {
            display: inline-block;
            background: rgba(255,255,255,0.2);
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        h1 {
            font-size: 56px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 16px;
        }
        
        .tagline {
            font-size: 24px;
            font-weight: 300;
            opacity: 0.95;
            margin-bottom: 32px;
        }
        
        .features {
            display: flex;
            gap: 32px;
        }
        
        .feature {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feature-icon {
            width: 40px;
            height: 40px;
            background: rgba(255,255,255,0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .feature-text {
            font-size: 16px;
            font-weight: 500;
        }
        
        .side-graphic {
            position: absolute;
            right: 80px;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1;
        }
        
        .book-mockup {
            width: 280px;
            height: 380px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            padding: 40px 30px;
            color: #1a1a1a;
        }
        
        .book-title {
            font-size: 22px;
            font-weight: 800;
            line-height: 1.2;
            margin-bottom: 12px;
        }
        
        .book-subtitle {
            font-size: 13px;
            color: #666;
            line-height: 1.4;
            margin-bottom: auto;
        }
        
        .book-badge {
            background: #10b981;
            color: white;
            padding: 8px 16px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: 700;
            text-align: center;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="content">
            <div class="badge">⚡ Digital Guide</div>
            <h1>Your First AI Employee</h1>
            <p class="tagline">Make OpenClaw work while you sleep</p>
            <div class="features">
                <div class="feature">
                    <div class="feature-icon">📖</div>
                    <div class="feature-text">24 Pages</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">⚙️</div>
                    <div class="feature-text">5 Workflows</div>
                </div>
                <div class="feature">
                    <div class="feature-icon">⏱️</div>
                    <div class="feature-text">364 hrs/year saved</div>
                </div>
            </div>
        </div>
        <div class="side-graphic">
            <div class="book-mockup">
                <div class="book-title">Your First AI Employee</div>
                <div class="book-subtitle">A practical guide for people who want AI that actually DOES things</div>
                <div class="book-badge">$14.99</div>
            </div>
        </div>
    </div>
</body>
</html>
