<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Slide 1 - Hook</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .slide {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            position: relative;
            overflow: hidden;
        }
        
        .slide::before {
            content: '';
            position: absolute;
            top: -200px;
            right: -200px;
            width: 500px;
            height: 500px;
            background: rgba(255,255,255,0.1);
            border-radius: 50%;
        }
        
        .slide-number {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 18px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
        }
        
        .content {
            text-align: center;
            color: white;
            position: relative;
            z-index: 1;
        }
        
        .emoji {
            font-size: 120px;
            margin-bottom: 40px;
        }
        
        h1 {
            font-size: 72px;
            font-weight: 800;
            line-height: 1.1;
            margin-bottom: 32px;
        }
        
        .subtitle {
            font-size: 32px;
            font-weight: 300;
            opacity: 0.95;
        }
        
        .branding {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        
        .handle {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-number">1/7</div>
        <div class="content">
            <div class="emoji">🤖</div>
            <h1>I've been using AI<br>wrong for years</h1>
            <p class="subtitle">Here's what changed everything...</p>
        </div>
        <div class="branding">Your First AI Employee</div>
        <div class="handle">@AskFizz</div>
    </div>
</body>
</html>
