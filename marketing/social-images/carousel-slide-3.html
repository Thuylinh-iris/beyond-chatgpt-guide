<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carousel Slide 3 - The Shift</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #1a1a1a;
            padding: 20px;
        }
        
        .slide {
            width: 1080px;
            height: 1080px;
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            border-radius: 16px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 80px;
            position: relative;
        }
        
        .slide-number {
            position: absolute;
            top: 40px;
            left: 40px;
            font-size: 18px;
            font-weight: 700;
            color: rgba(255,255,255,0.5);
        }
        
        .content {
            text-align: center;
            color: white;
        }
        
        h2 {
            font-size: 48px;
            font-weight: 700;
            opacity: 0.9;
            margin-bottom: 40px;
        }
        
        .shift-container {
            display: flex;
            align-items: center;
            gap: 40px;
            margin-bottom: 60px;
        }
        
        .shift-box {
            background: rgba(255,255,255,0.15);
            padding: 40px 50px;
            border-radius: 16px;
            backdrop-filter: blur(10px);
        }
        
        .shift-box.old {
            background: rgba(239,68,68,0.3);
        }
        
        .shift-label {
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
            margin-bottom: 16px;
        }
        
        .shift-text {
            font-size: 32px;
            font-weight: 700;
        }
        
        .arrow {
            font-size: 60px;
        }
        
        .tagline {
            font-size: 36px;
            font-weight: 300;
            opacity: 0.95;
        }
        
        .branding {
            position: absolute;
            bottom: 40px;
            left: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
        
        .handle {
            position: absolute;
            bottom: 40px;
            right: 40px;
            font-size: 16px;
            color: rgba(255,255,255,0.7);
        }
    </style>
</head>
<body>
    <div class="slide">
        <div class="slide-number">3/7</div>
        <div class="content">
            <h2>The Mindset Shift</h2>
            <div class="shift-container">
                <div class="shift-box old">
                    <div class="shift-label">Old</div>
                    <div class="shift-text">"AI I chat with"</div>
                </div>
                <div class="arrow">→</div>
                <div class="shift-box">
                    <div class="shift-label">New</div>
                    <div class="shift-text">"AI I delegate to"</div>
                </div>
            </div>
            <p class="tagline">One talks. The other does.</p>
        </div>
        <div class="branding">Your First AI Employee</div>
        <div class="handle">@AskFizz</div>
    </div>
</body>
</html>
